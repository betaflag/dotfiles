# Default apps for file types (macOS LaunchServices). Applied by ./bootstrap, which
# loops `duti -s` per line — a single `duti duti.conf` batch races LaunchServices and
# silently drops some. Format: <bundle-id> <UTI> <role>.
#
# Bound by UTI (matches files by content-type conformance), not by extension.
# Not bindable, so intentionally absent: .lua/.conf (their UTIs don't conform to any
# hierarchy), and .vue/.svelte/.scss/.tf/.hcl (macOS gives them only a dynamic UTI).
# .ts/.go/.rs are omitted on purpose — Zed claims them via its own Info.plist, and
# their script UTIs don't conform to a hierarchy (.ts's UTI is also MPEG-2 video).

# Generic text & source
dev.zed.Zed public.plain-text all
dev.zed.Zed public.source-code all
dev.zed.Zed public.script all

# Shell
dev.zed.Zed public.shell-script all
dev.zed.Zed public.bash-script all
dev.zed.Zed public.zsh-script all

# Languages
dev.zed.Zed public.python-script all
dev.zed.Zed public.ruby-script all
dev.zed.Zed public.php-script all
dev.zed.Zed com.netscape.javascript-source all
dev.zed.Zed com.microsoft.typescript all
dev.zed.Zed public.c-source all
dev.zed.Zed public.c-header all
dev.zed.Zed public.c-plus-plus-source all
dev.zed.Zed public.c-plus-plus-header all
dev.zed.Zed public.objective-c-source all
dev.zed.Zed public.swift-source all
dev.zed.Zed com.sun.java-source all

# Web & markup
# NOTE: public.html is deliberately NOT bound. macOS ties it to the default-browser
# role, so pointing it at an editor hijacks http/https link handling. .html stays
# with the browser.
dev.zed.Zed public.css all
dev.zed.Zed public.xml all

# Config & data
dev.zed.Zed public.json all
dev.zed.Zed public.yaml all
dev.zed.Zed public.toml all
dev.zed.Zed com.microsoft.ini all

# Docs, text & logs
dev.zed.Zed net.daringfireball.markdown all
dev.zed.Zed public.comma-separated-values-text all
dev.zed.Zed public.tab-separated-values-text all
dev.zed.Zed public.patch-file all
dev.zed.Zed com.apple.log all
